name: Run chainrnd
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "fetch | scenario | both"
        required: true
        default: "both"
        type: choice
        options: [fetch, scenario, both]
      chain:
        description: "Chain"
        required: true
        default: "ethereum"
        type: choice
        options: [ethereum, bsc, polygon, arbitrum]
      contract:
        description: "Token contract address"
        required: true
      run_whale_smart_money:
        description: "Run scenario: whale_smart_money"
        required: false
        default: true
        type: boolean
      run_exchange_flow:
        description: "Run scenario: exchange_flow"
        required: false
        default: true
        type: boolean
      run_summary_report:
        description: "Run scenario: summary_report (combined Markdown + charts)"
        required: false
        default: true
        type: boolean
      from_date:
        description: "Optional start date YYYY-MM-DD"
        required: false
        default: ""
      to_date:
        description: "Optional end date YYYY-MM-DD"
        required: false
        default: ""

permissions:
  contents: write   # <-- required so github-actions[bot] can push commits back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build command flags
        id: flags
        run: |
          FLAGS=""
          if [ "${{ inputs.mode }}" = "fetch" ] || [ "${{ inputs.mode }}" = "both" ]; then
            FLAGS="$FLAGS --fetch"
          fi
          if [ "${{ inputs.mode }}" = "scenario" ] || [ "${{ inputs.mode }}" = "both" ]; then
            SCENARIOS=""
            if [ "${{ inputs.run_whale_smart_money }}" = "true" ]; then
              SCENARIOS="whale_smart_money"
            fi
            if [ "${{ inputs.run_exchange_flow }}" = "true" ]; then
              if [ -n "$SCENARIOS" ]; then SCENARIOS="$SCENARIOS,exchange_flow"; else SCENARIOS="exchange_flow"; fi
            fi
            if [ "${{ inputs.run_summary_report }}" = "true" ]; then
              if [ -n "$SCENARIOS" ]; then SCENARIOS="$SCENARIOS,summary_report"; else SCENARIOS="summary_report"; fi
            fi
            if [ -n "$SCENARIOS" ]; then
              FLAGS="$FLAGS --scenario $SCENARIOS"
            fi
          fi
          if [ -n "${{ inputs.from_date }}" ]; then
            FLAGS="$FLAGS --from-date ${{ inputs.from_date }}"
          fi
          if [ -n "${{ inputs.to_date }}" ]; then
            FLAGS="$FLAGS --to-date ${{ inputs.to_date }}"
          fi
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
      - name: Run
        env:
          EXPLORER_API_KEY: ${{ secrets.EXPLORER_API_KEY }}
          KNOWN_EXCHANGE_ADDRESSES: ${{ vars.KNOWN_EXCHANGE_ADDRESSES }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGECKO_COIN_ID: ${{ vars.COINGECKO_COIN_ID }}
        run: |
          cd src
          python run.py --chain ${{ inputs.chain }} --contract ${{ inputs.contract }} ${{ steps.flags.outputs.flags }}
      - name: Commit updated data + results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw data/cache output
          git diff --cached --quiet || git commit -m "Automated run: ${{ inputs.mode }} ${{ inputs.chain }}/${{ inputs.contract }}"
          git push
